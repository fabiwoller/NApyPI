name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    env:
      RPY2_CFFI_MODE: ABI
      # Pointing to a specific snapshot from last month (March 15, 2026)
      CRAN_SNAPSHOT: "https://packagemanager.posit.co/cran/__linux__/noble/2026-03-15"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ---- Python setup ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- System dependencies ----
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"

      - name: Install required R packages from Snapshot
        run: |
          Rscript -e "install.packages(
            c('lsr', 'rstatix', 'effectsize', 'Hmisc'),
            repos = '${{ env.CRAN_SNAPSHOT }}'
          )"

      # ---- Python dependencies ----
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==1.26.* \
            scipy==1.11.0 \
            numba==0.60.0 \
            numba-scipy==0.4.0 \
            pandas
          pip install rpy2==3.5.12
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install .

      # ---- Run tests ----
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests
